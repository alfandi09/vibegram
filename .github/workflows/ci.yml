name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Test & Lint (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x, 20.x, 22.x]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint --if-present

            - name: Type check source
              run: npm run typecheck

            - name: Type check tests
              run: npm run typecheck:test

            - name: Type check examples
              run: npm run typecheck:examples

            - name: Run tests with coverage
              run: npm run test:coverage

            - name: Audit runtime dependencies
              run: npm audit --omit=dev --audit-level=high

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: npm run build

            - name: Verify dist output
              run: |
                  test -f dist/cjs/index.js && echo "CJS built successfully"
                  test -f dist/cjs/package.json && echo "CJS package marker written"
                  test -f dist/esm/index.js && echo "ESM built successfully"
                  test -f dist/esm/package.json && echo "ESM package marker written"
                  test -f dist/types/index.d.ts && echo "Types generated successfully"

            - name: Upload dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7

    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: [test, build]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  registry-url: 'https://registry.npmjs.org'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check if version changed
              id: version_check
              run: |
                  LOCAL_VERSION=$(node -p "require('./package.json').version")
                  REMOTE_VERSION=$(npm view vibegram version 2>/dev/null || echo "0.0.0")
                  echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
                  echo "remote=$REMOTE_VERSION" >> $GITHUB_OUTPUT
                  if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Build for publish
              if: steps.version_check.outputs.changed == 'true'
              run: npm run build

            - name: Publish
              if: steps.version_check.outputs.changed == 'true'
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
